name: Build Windows EXE
run-name: "Windows portable build #${{ github.run_number }}"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") {
            python -m pip install -r requirements.txt
          }
          python -m pip install pyinstaller pywebview

      - name: Build exe
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass
          .\scripts\build_windows_exe.ps1

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item dist\PatentAgent release\PatentAgent -Recurse
          @"
          PatentAgent Windows portable build
          Commit: $env:GITHUB_SHA
          Run: $env:GITHUB_RUN_NUMBER
          Packaging: onedir
          AI integration: PatentAgentMCP\PatentAgentMCP.exe --mcp
          Pillow AVIF extension: excluded
          "@ | Set-Content release\PatentAgent\BUILD_INFO.txt -Encoding UTF8

          if (-not (Test-Path release\PatentAgent\PatentAgent.exe)) {
            throw "PatentAgent.exe is missing from the portable package."
          }
          if (-not (Test-Path release\PatentAgent\PatentAgentMCP\PatentAgentMCP.exe)) {
            throw "PatentAgentMCP.exe is missing from the portable package."
          }
          if (-not (Test-Path release\PatentAgent\_internal)) {
            throw "Portable package is missing the _internal directory."
          }
          if (-not (Test-Path release\PatentAgent\PatentAgentMCP\_internal)) {
            throw "MCP portable package is missing the _internal directory."
          }
          if (-not (Test-Path release\PatentAgent\Register-Codex.cmd)) {
            throw "Codex registration script is missing."
          }
          if (-not (Test-Path release\PatentAgent\pi-runtime\node.exe)) {
            throw "Bundled Node.js is missing."
          }
          if (-not (Test-Path release\PatentAgent\pi-runtime\node_modules\@earendil-works\pi-coding-agent\dist\cli.js)) {
            throw "Bundled Pi Coding Agent is missing."
          }
          $AvifFiles = @(Get-ChildItem release\PatentAgent -Recurse -File | Where-Object { $_.Name -like "*_avif*.pyd" })
          if ($AvifFiles.Count -gt 0) {
            throw "Portable package unexpectedly contains Pillow AVIF binaries."
          }

      - name: Verify AI integration executable
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $McpExe = (Resolve-Path ".\release\PatentAgent\PatentAgentMCP\PatentAgentMCP.exe").Path
          $VerifyDir = Join-Path $env:RUNNER_TEMP "patent-agent-verification"
          New-Item -ItemType Directory -Force $VerifyDir | Out-Null
          $StdoutPath = Join-Path $VerifyDir "mcp-tools.stdout.json"
          $StderrPath = Join-Path $VerifyDir "mcp-tools.stderr.txt"

          $Process = Start-Process `
            -FilePath $McpExe `
            -ArgumentList @("--cli", "tools") `
            -Wait `
            -PassThru `
            -NoNewWindow `
            -RedirectStandardOutput $StdoutPath `
            -RedirectStandardError $StderrPath

          $StderrText = if (Test-Path $StderrPath) {
            Get-Content $StderrPath -Raw -ErrorAction SilentlyContinue
          } else { "" }
          if ($StderrText) {
            Write-Host "PatentAgentMCP stderr:"
            Write-Host $StderrText
          }
          if ($Process.ExitCode -ne 0) {
            throw "PatentAgentMCP CLI failed with exit code $($Process.ExitCode). See stderr above."
          }

          $ToolJson = Get-Content $StdoutPath -Raw
          if ([string]::IsNullOrWhiteSpace($ToolJson)) {
            throw "PatentAgentMCP CLI returned empty stdout."
          }
          try {
            $ToolData = $ToolJson | ConvertFrom-Json -ErrorAction Stop
          } catch {
            Write-Host "PatentAgentMCP stdout:"
            Write-Host $ToolJson
            throw "PatentAgentMCP CLI returned invalid JSON: $($_.Exception.Message)"
          }
          $ToolNames = @($ToolData.tools | ForEach-Object { $_.name })
          foreach ($Required in @("patent_start_run", "patent_list_active_runs", "patent_select_idea", "patent_accept_section", "patent_list_history")) {
            if ($Required -notin $ToolNames) {
              throw "Required MCP tool is missing: $Required"
            }
          }
          Write-Host "Verified $($ToolNames.Count) Patent Agent MCP tools."
          $NodeVersion = & release\PatentAgent\pi-runtime\node.exe --version
          if ($LASTEXITCODE -ne 0) {
            throw "Bundled Node.js failed to start."
          }
          Write-Host "Verified bundled Node.js: $NodeVersion"

      - name: Upload verification diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PatentAgent-Windows-verification-${{ github.run_number }}
          path: ${{ runner.temp }}/patent-agent-verification
          if-no-files-found: ignore

      - name: Upload Windows portable package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PatentAgent-Windows-${{ github.run_number }}
          path: release
          if-no-files-found: error
