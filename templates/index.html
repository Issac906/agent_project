<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>专利策源台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Patent Discovery Agent</p>
          <h1>专利策源台</h1>
        </div>
        <div class="top-actions">
          <a class="button ghost" href="/settings">系统设置</a>
          <a class="button ghost" href="/history">历史记录</a>
          <button class="button ghost" id="refreshBtn">刷新知识库</button>
          <button class="button primary" id="startBtn">生成专利方案</button>
        </div>
      </header>

      <section class="summary-grid flat-summary" aria-label="知识库状态">
        <div class="metric">
          <span>已处理文档</span>
          <strong id="processedCount">-</strong>
        </div>
        <div class="metric">
          <span>全部文档</span>
          <strong id="allCount">-</strong>
        </div>
        <div class="metric">
          <span>失败文档</span>
          <strong id="failedCount">-</strong>
        </div>
      </section>

      <section class="workspace-section compact-panel">
        <div class="panel-head">
          <div>
            <h2>生成偏好</h2>
            <p>选择图谱节点探索范围。低档只看邻近区域，中档看较大范围，高档允许全图组合。</p>
          </div>
          <span class="status-pill" id="innovationValue">中</span>
        </div>
        <div class="segmented-control" id="innovationLevelControl">
          <label>
            <input type="radio" name="innovationLevel" value="low">
            <span>低</span>
          </label>
          <label>
            <input type="radio" name="innovationLevel" value="medium" checked>
            <span>中</span>
          </label>
          <label>
            <input type="radio" name="innovationLevel" value="high">
            <span>高</span>
          </label>
        </div>
      </section>

      <section class="workspace-section knowledge-workspace">
        <div class="panel-head">
          <div>
            <h2>知识库素材</h2>
            <p>当前 agent 将基于这些材料提出专利方向，并结合外部检索做避重分析。</p>
          </div>
          <span class="status-pill" id="loadState">准备读取</span>
        </div>
        <div class="knowledge-tools">
          <form id="uploadForm" class="upload-form upload-workflow">
            <div class="upload-file-row">
              <label class="file-picker">
                <span>选择素材文件</span>
                <input type="file" id="materialFile" name="file">
              </label>
              <button class="button primary" type="submit" id="uploadBtn">上传并扫描</button>
            </div>
            <fieldset class="upload-destination">
              <legend>素材存入位置</legend>
              <div class="destination-mode" role="radiogroup" aria-label="知识库分配方式">
                <label>
                  <input type="radio" name="knowledgeBaseMode" value="existing" checked>
                  <span>已有知识库</span>
                </label>
                <label>
                  <input type="radio" name="knowledgeBaseMode" value="new">
                  <span>新建知识库</span>
                </label>
              </div>
              <label class="destination-field" id="existingKnowledgeBaseField">
                <span>选择知识库</span>
                <select id="uploadKnowledgeBaseId" aria-label="选择已有知识库"></select>
              </label>
              <div class="new-knowledge-base-fields hidden" id="newKnowledgeBaseFields">
                <label class="destination-field">
                  <span>知识库名称</span>
                  <input id="newKnowledgeBaseName" type="text" maxlength="60" placeholder="例如：铝电解工艺知识库">
                </label>
                <label class="destination-field">
                  <span>用途说明（选填）</span>
                  <input id="newKnowledgeBaseDescription" type="text" maxlength="160" placeholder="说明该知识库包含的素材范围">
                </label>
                <label class="destination-field" id="manualKnowledgeBaseUrlField">
                  <span>独立 LightRAG API 地址</span>
                  <input id="newKnowledgeBaseBaseUrl" type="url" placeholder="例如：http://192.168.130.130:9622">
                </label>
              </div>
              <p class="destination-note" id="kbProvisioningNote">正在检查自动知识库管理服务。</p>
            </fieldset>
          </form>
          <div class="danger-actions">
            <button class="button danger" id="deleteSelectedBtn" type="button" disabled>删除选中素材</button>
            <button class="button danger" id="clearBtn" type="button">清空知识库</button>
          </div>
        </div>
        <div id="toolMessage" class="tool-message hidden"></div>
        <div id="knowledgeBases" class="knowledge-bases"></div>
        <div id="documents" class="doc-list"></div>
      </section>
    </main>

    <script>
      const documentsEl = document.getElementById("documents");
      const loadState = document.getElementById("loadState");
      const processedCount = document.getElementById("processedCount");
      const allCount = document.getElementById("allCount");
      const failedCount = document.getElementById("failedCount");
      const toolMessage = document.getElementById("toolMessage");
      const knowledgeBasesEl = document.getElementById("knowledgeBases");
      const deleteSelectedBtn = document.getElementById("deleteSelectedBtn");
      const innovationValue = document.getElementById("innovationValue");
      let selectedKnowledgeBaseId = "all";
      let knowledgeScopeOptions = [];
      let knowledgeBaseCatalog = [];
      let kbManager = { configured: false, available: false };

      function showMessage(text, type = "info") {
        toolMessage.className = `tool-message ${type}`;
        toolMessage.textContent = text;
      }

      function hideMessage() {
        toolMessage.className = "tool-message hidden";
        toolMessage.textContent = "";
      }

      function compact(text, max = 180) {
        if (!text) return "暂无摘要";
        return text.length > max ? `${text.slice(0, max)}...` : text;
      }

      function shortText(value, limit) {
        const text = String(value || "未命名");
        return text.length > limit ? `${text.slice(0, limit - 1)}…` : text;
      }

      async function loadKnowledge() {
        loadState.textContent = "读取中";
        documentsEl.innerHTML = '<div class="empty">正在读取知识库...</div>';
        try {
          const res = await fetch("/api/knowledge");
          const data = await res.json();
          const counts = data.counts.status_counts || {};
          processedCount.textContent = counts.processed ?? "-";
          allCount.textContent = counts.all ?? "-";
          failedCount.textContent = counts.failed ?? "-";
          loadState.textContent = "已连接";
          kbManager = data.kb_manager || { configured: false, available: false };
          updateProvisioningUi();
          renderKnowledgeBases(
            data.knowledge_bases || [],
            data.graph,
            data.documents || [],
            data.lightrag_graph_url || ""
          );
          updateKnowledgeBaseCatalog(data.knowledge_base_catalog || data.knowledge_bases || []);
          renderDocumentsForScope();
          if (!(knowledgeScopeOptions.find((item) => item.id === selectedKnowledgeBaseId)?.documents || []).length) {
            documentsEl.innerHTML = '<div class="empty">暂无可用文档</div>';
            return;
          }
          bindDocumentCheckboxes();
        } catch (err) {
          loadState.textContent = "读取失败";
          documentsEl.innerHTML = `<div class="empty danger">${err}</div>`;
          knowledgeBasesEl.innerHTML = "";
        }
      }

      function renderDocumentsForScope() {
        const scope = knowledgeScopeOptions.find((item) => item.id === selectedKnowledgeBaseId);
        const rows = scope?.documents || [];
        documentsEl.innerHTML = rows.map((doc) => `
            <article class="doc-item">
              <label class="doc-select">
                <input type="checkbox" class="doc-checkbox" value="${escapeHtml(doc.id || "")}" ${doc.id ? "" : "disabled"}>
                <span></span>
              </label>
              <div>
                <div class="doc-title">${escapeHtml(doc.file_path)}</div>
                <div class="doc-meta">
                  <span>${escapeHtml(doc.status)}</span>
                  <span>${doc.chunks_count || 0} chunks</span>
                  ${doc.id ? `<span>ID: ${escapeHtml(doc.id)}</span>` : `<span>无可删除 ID</span>`}
                </div>
                <p>${escapeHtml(compact(doc.content_summary))}</p>
              </div>
            </article>
          `).join("") || '<div class="empty">当前知识库暂无可用文档</div>';
      }

      function bindDocumentCheckboxes() {
        documentsEl.querySelectorAll(".doc-checkbox").forEach((checkbox) => {
            checkbox.addEventListener("change", updateDeleteButton);
        });
        updateDeleteButton();
      }

      function selectedDocIds() {
        return Array.from(document.querySelectorAll(".doc-checkbox:checked"))
          .map((item) => item.value)
          .filter(Boolean);
      }

      function updateDeleteButton() {
        deleteSelectedBtn.disabled = selectedDocIds().length === 0;
      }

      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, (c) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
        }[c]));
      }

      function renderKnowledgeGraph(graph) {
        if (graph?.layout === "native-network" || graph?.source === "lightrag_native_graph") {
          renderNativeKnowledgeGraph(graph);
          return;
        }

        const rawNodes = graph?.nodes || [];
        const rawEdges = graph?.edges || [];
        if (!rawNodes.length) {
          knowledgeGraphEl.innerHTML = '<div class="empty">暂无知识图谱</div>';
          return;
        }

        const root = rawNodes.find((node) => node.type === "root") || rawNodes[0];
        const docs = rawNodes.filter((node) => node.type === "document").slice(0, 8);
        const concepts = rawNodes.filter((node) => node.type !== "root" && node.type !== "document").slice(0, 8);
        const visibleNodes = [root, ...docs, ...concepts];
        const nodeById = new Map(rawNodes.map((node) => [node.id, node]));
        const width = 1120;
        const rowGap = 82;
        const laneCount = Math.max(docs.length, concepts.length, 4);
        const height = Math.max(450, 150 + laneCount * rowGap);
        const centerY = height / 2;
        const positions = new Map();
        positions.set(root.id, { x: 560, y: centerY, w: 142, h: 62 });

        const conceptSources = new Map();
        rawEdges.forEach((edge) => {
          const sourceNode = nodeById.get(edge.source);
          const targetNode = nodeById.get(edge.target);
          if (!sourceNode || !targetNode) return;
          const conceptId = targetNode.type === "document" ? edge.source : edge.target;
          const docNode = sourceNode.type === "document" ? sourceNode : targetNode.type === "document" ? targetNode : null;
          const conceptNode = nodeById.get(conceptId);
          if (!docNode || !conceptNode || conceptNode.type === "document" || conceptNode.type === "root") return;
          const list = conceptSources.get(conceptId) || [];
          list.push(`${docNode.label || docNode.id}：${edge.label || "关联"}`);
          conceptSources.set(conceptId, Array.from(new Set(list)).slice(0, 4));
        });

        function stack(nodes, x, boxWidth, gap = rowGap) {
          const total = (nodes.length - 1) * gap;
          const startY = centerY - total / 2;
          nodes.forEach((node, index) => {
            positions.set(node.id, { x, y: startY + index * gap, w: boxWidth, h: 52 });
          });
        }
        stack(docs, 210, 255);
        stack(concepts, 910, 230);

        const displayEdges = [
          ...docs.map((doc) => ({ source: doc.id, target: root.id, label: "汇入", source_label: doc.label, target_label: root.label })),
          ...concepts.map((concept) => ({ source: root.id, target: concept.id, label: "提炼", source_label: root.label, target_label: concept.label })),
        ];

        function edgePath(edge, index, side) {
          const source = positions.get(edge.source);
          const target = positions.get(edge.target);
          if (!source || !target) return "";
          const sourceRight = source.x < target.x;
          const x1 = source.x + (sourceRight ? source.w / 2 : -source.w / 2);
          const y1 = source.y;
          const x2 = target.x + (sourceRight ? -target.w / 2 : target.w / 2);
          const y2 = target.y;
          const laneOffset = ((index % 3) - 1) * 12;
          const c1 = x1 + (x2 - x1) * 0.46 + laneOffset;
          const c2 = x1 + (x2 - x1) * 0.54 + laneOffset;
          return `
            <path class="kg-edge-path ${side}" d="M ${x1} ${y1} C ${c1} ${y1}, ${c2} ${y2}, ${x2} ${y2}">
              <title>${escapeHtml(edge.source_label || edge.source)} ${escapeHtml(edge.label || "关联")} ${escapeHtml(edge.target_label || edge.target)}</title>
            </path>
          `;
        }

        const leftEdges = displayEdges.filter((edge) => edge.target === root.id).map((edge, index) => edgePath(edge, index, "left")).join("");
        const rightEdges = displayEdges.filter((edge) => edge.source === root.id).map((edge, index) => edgePath(edge, index, "right")).join("");

        function textLines(label, maxChars, maxLines = 2) {
          const value = String(label || "未命名");
          const lines = [];
          for (let index = 0; index < value.length && lines.length < maxLines; index += maxChars) {
            lines.push(value.slice(index, index + maxChars));
          }
          if (value.length > maxChars * maxLines && lines.length) {
            lines[lines.length - 1] = `${lines[lines.length - 1].slice(0, Math.max(1, maxChars - 1))}…`;
          }
          return lines;
        }

        function nodeSvg(node) {
          const point = positions.get(node.id);
          if (!point) return "";
          const maxChars = node.type === "document" ? 13 : node.type === "root" ? 8 : 9;
          const lines = textLines(node.label || node.id, maxChars, 2);
          const yStart = lines.length === 1 ? 5 : -5;
          const sources = conceptSources.get(node.id) || [];
          const sourceText = sources.length ? `
来源关联：
${sources.join("\n")}` : "";
          return `
            <g class="kg-node ${escapeHtml(node.type || "concept")}" transform="translate(${point.x}, ${point.y})">
              <rect x="${-point.w / 2}" y="${-point.h / 2}" width="${point.w}" height="${point.h}" rx="10"></rect>
              <title>${escapeHtml(node.label || node.id)}
${escapeHtml(node.summary || "")}${escapeHtml(sourceText)}</title>
              ${lines.map((line, index) => `<text text-anchor="middle" y="${yStart + index * 15}">${escapeHtml(line)}</text>`).join("")}
            </g>
          `;
        }

        knowledgeGraphEl.innerHTML = `
          <div class="kg-head">
            <div>
              <h3>知识图谱</h3>
              <p>${escapeHtml(graph.summary || "已基于当前知识库生成素材关系图。")}</p>
            </div>
            <span>${escapeHtml(graph.layout || graph.source || "graph")}</span>
          </div>
          <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="当前知识库知识图谱">
            <defs>
              <marker id="kgArrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
                <path d="M 0 0 L 8 4 L 0 8 z"></path>
              </marker>
            </defs>
            <text class="kg-column-title" x="210" y="36" text-anchor="middle">素材文档</text>
            <text class="kg-column-title" x="560" y="36" text-anchor="middle">知识库主题</text>
            <text class="kg-column-title" x="910" y="36" text-anchor="middle">核心概念</text>
            <text class="kg-column-note" x="910" y="58" text-anchor="middle">悬停节点查看来源文档</text>
            ${leftEdges}
            ${rightEdges}
            ${visibleNodes.map(nodeSvg).join("")}
          </svg>
          ${(graph.notes || []).length ? `<div class="kg-notes">${graph.notes.map((note) => `<span>${escapeHtml(note)}</span>`).join("")}</div>` : ""}
        `;
      }

      function renderKnowledgeBases(groups, fullGraph, documents, lightragGraphUrl) {
        knowledgeScopeOptions = [
          {
            id: "all",
            name: "总知识库",
            description: "使用当前 LightRAG 知识库的完整图谱，和之前一样覆盖全部素材。",
            document_count: documents.length,
            node_count: (fullGraph?.nodes || []).length,
            edge_count: (fullGraph?.edges || []).length,
            documents,
            graph: fullGraph,
            graph_url: lightragGraphUrl,
            selectable: true,
            isolation: "physical",
          },
          ...groups,
        ];
        if (!knowledgeScopeOptions.some((item) => item.id === selectedKnowledgeBaseId && item.selectable !== false)) {
          selectedKnowledgeBaseId = "all";
        }
        if (!knowledgeScopeOptions.length) {
          knowledgeBasesEl.innerHTML = '<div class="empty">暂无可选知识图谱。</div>';
          return;
        }
        knowledgeBasesEl.innerHTML = `
          <div class="kb-group-head">
            <div>
              <h3>本次生成使用图谱</h3>
              <p>请选择一个图谱作为本次专利生成的唯一知识库证据源。</p>
            </div>
            <span>${knowledgeScopeOptions.length} 个可选图谱</span>
          </div>
          <div class="kb-group-grid">
            ${knowledgeScopeOptions.map((group) => `
              <article class="kb-row kb-choice ${group.id === selectedKnowledgeBaseId ? "selected" : ""} ${group.selectable === false ? "disabled" : ""}">
                <label class="kb-choice-body">
                  <input type="radio" name="knowledgeBaseId" value="${escapeHtml(group.id)}" ${group.id === selectedKnowledgeBaseId ? "checked" : ""} ${group.selectable === false ? "disabled" : ""}>
                  <div class="registry-head">
                    <strong>${escapeHtml(group.name || "未命名知识库")}</strong>
                    <span>${group.document_count || 0} 文档</span>
                  </div>
                  <p>${escapeHtml(group.description || "")}</p>
                  <div class="kb-stats">
                    <span>${group.node_count || 0} 节点</span>
                    <span>${group.edge_count || 0} 关系</span>
                  </div>
                  <div class="material-source-list">
                    ${(group.documents || []).slice(0, 4).map((doc) => `<span>${escapeHtml(doc.file_path || "未知文档")}</span>`).join("")}
                  </div>
                  ${group.status_message ? `<span class="classification-note">${escapeHtml(group.status_message)}</span>` : ''}
                </label>
                <div class="kb-card-actions">
                  ${group.graph_url
                    ? `<a class="button ghost kb-graph-link" href="${escapeHtml(group.graph_url)}" target="_blank" rel="noopener noreferrer">查看该知识库的知识图谱</a>`
                    : '<span class="kb-graph-unavailable">LightRAG 图谱地址未配置</span>'}
                  ${group.isolation === "migration_required"
                    ? `<button class="button ghost kb-bind-instance" type="button" data-kb-id="${escapeHtml(group.id)}">绑定独立实例</button>`
                    : ""}
                  ${group.managed
                    ? `<button class="button danger kb-delete-instance" type="button" data-kb-id="${escapeHtml(group.id)}" data-kb-name="${escapeHtml(group.name)}">删除该知识库</button>`
                    : ""}
                </div>
              </article>
            `).join("")}
          </div>
        `;
        knowledgeBasesEl.querySelectorAll('input[name="knowledgeBaseId"]').forEach((input) => {
          input.addEventListener("change", () => selectKnowledgeScope(input.value));
        });
        knowledgeBasesEl.querySelectorAll(".kb-bind-instance").forEach((button) => {
          button.addEventListener("click", () => bindKnowledgeBaseInstance(button.dataset.kbId));
        });
        knowledgeBasesEl.querySelectorAll(".kb-delete-instance").forEach((button) => {
          button.addEventListener("click", () => deleteManagedKnowledgeBase(button.dataset.kbId, button.dataset.kbName));
        });
      }

      async function deleteManagedKnowledgeBase(id, name) {
        const confirmation = window.prompt(`该操作会停止“${name}”的独立实例。请输入完整知识库名称确认：`);
        if (confirmation !== name) return;
        showMessage(`正在删除“${name}”。服务器会保留数据目录供管理员恢复。`, "info");
        try {
          const response = await fetch(`/api/knowledge/bases/${encodeURIComponent(id)}`, {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ confirm_name: confirmation })
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.error || "删除失败");
          selectedKnowledgeBaseId = "all";
          showMessage(`“${name}”已删除，服务器数据目录已保留。`, "success");
          await loadKnowledge();
        } catch (error) {
          showMessage(`删除失败：${error.message || error}`, "danger");
        }
      }

      async function bindKnowledgeBaseInstance(id) {
        const baseUrl = window.prompt("请输入该知识库独立的 LightRAG API 地址，例如 http://server:9622");
        if (!baseUrl) return;
        showMessage("正在验证并绑定独立知识库实例。", "info");
        try {
          const res = await fetch(`/api/knowledge/bases/${encodeURIComponent(id)}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ base_url: baseUrl.trim() })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "绑定失败");
          showMessage("独立实例绑定成功。请把属于该库的素材重新上传到该实例。", "success");
          await loadKnowledge();
        } catch (err) {
          showMessage(`绑定失败：${err}`, "danger");
        }
      }

      function updateKnowledgeBaseCatalog(rows) {
        knowledgeBaseCatalog = (rows || []).filter((item) => item && item.id && item.id !== "unassigned" && item.selectable !== false);
        const select = document.getElementById("uploadKnowledgeBaseId");
        const previous = select.value;
        select.innerHTML = knowledgeBaseCatalog.map((item) =>
          `<option value="${escapeHtml(item.id)}">${escapeHtml(item.name || item.id)}</option>`
        ).join("");
        if (knowledgeBaseCatalog.some((item) => item.id === previous)) select.value = previous;
        updateUploadDestinationState();
      }

      function updateUploadDestinationState() {
        const mode = document.querySelector('input[name="knowledgeBaseMode"]:checked')?.value || "existing";
        const hasExisting = knowledgeBaseCatalog.length > 0;
        if (mode === "existing" && !hasExisting) {
          document.querySelector('input[name="knowledgeBaseMode"][value="new"]').checked = true;
        }
        const currentMode = document.querySelector('input[name="knowledgeBaseMode"]:checked')?.value || "new";
        document.getElementById("existingKnowledgeBaseField").classList.toggle("hidden", currentMode !== "existing");
        document.getElementById("newKnowledgeBaseFields").classList.toggle("hidden", currentMode !== "new");
        updateProvisioningUi();
      }

      function updateProvisioningUi() {
        const manualField = document.getElementById("manualKnowledgeBaseUrlField");
        const note = document.getElementById("kbProvisioningNote");
        const automatic = Boolean(kbManager?.available);
        manualField.classList.toggle("hidden", automatic);
        note.textContent = automatic
          ? "新建时会自动创建独立 LightRAG 实例、存储目录和知识图谱，无需填写端口。"
          : `${kbManager?.message || "自动管理服务未配置。"} 管理员仍可填写已部署的独立 LightRAG 地址。`;
      }

      function selectKnowledgeScope(id) {
        selectedKnowledgeBaseId = id || "all";
        knowledgeBasesEl.querySelectorAll(".kb-choice").forEach((card) => {
          const input = card.querySelector('input[name="knowledgeBaseId"]');
          card.classList.toggle("selected", input?.value === selectedKnowledgeBaseId);
        });
        renderDocumentsForScope();
        bindDocumentCheckboxes();
      }

      function knowledgeBaseMiniGraph(graph) {
        const nodes = (graph?.nodes || []).filter((node) => node && node.id).slice(0, 18);
        const nodeIds = new Set(nodes.map((node) => node.id));
        const edges = (graph?.edges || [])
          .filter((edge) => edge && nodeIds.has(edge.source) && nodeIds.has(edge.target))
          .slice(0, 24);
        if (!nodes.length) return '<div class="kb-mini-graph empty">暂无子图谱</div>';
        const width = 420;
        const height = 210;
        const center = { x: width / 2, y: height / 2 };
        const positioned = nodes.map((node, index) => {
          const angle = (index * 2.399963229728653) % (Math.PI * 2);
          const ring = 44 + (index % 4) * 22;
          return {
            ...node,
            x: center.x + Math.cos(angle) * ring,
            y: center.y + Math.sin(angle) * ring * 0.62,
            r: Math.max(5, Math.min(18, 6 + Number(node.degree || 0) * 1.8)),
          };
        });
        const byId = new Map(positioned.map((node) => [node.id, node]));
        return `
          <svg class="kb-mini-graph" viewBox="0 0 ${width} ${height}" role="img" aria-label="分类知识库子图谱">
            ${edges.map((edge) => {
              const a = byId.get(edge.source);
              const b = byId.get(edge.target);
              if (!a || !b) return "";
              return `<line class="kg-network-edge" x1="${a.x.toFixed(1)}" y1="${a.y.toFixed(1)}" x2="${b.x.toFixed(1)}" y2="${b.y.toFixed(1)}"><title>${escapeHtml(edge.label || "关联")}</title></line>`;
            }).join("")}
            ${positioned.map((node) => `
              <g class="kg-network-node ${escapeHtml(node.type || "concept")}" transform="translate(${node.x.toFixed(1)}, ${node.y.toFixed(1)})">
                <circle r="${node.r.toFixed(1)}"></circle>
                <title>${escapeHtml(node.full_label || node.label || node.id)}\n${escapeHtml(node.summary || "")}</title>
                ${node.degree >= 3 ? `<text x="${node.r + 5}" y="4">${escapeHtml(shortText(node.full_label || node.label || node.id, 16))}</text>` : ""}
              </g>
            `).join("")}
          </svg>
        `;
      }

      function renderNativeKnowledgeGraph(graph) {
        const rawNodes = (graph?.nodes || []).filter((node) => node && node.id);
        const rawEdges = (graph?.edges || []).filter((edge) => edge && edge.source && edge.target);
        if (!rawNodes.length) {
          knowledgeGraphEl.innerHTML = '<div class="empty">暂无知识图谱</div>';
          return;
        }
        const currentNodeIds = new Set(rawNodes.map((node) => node.id));
        const hasPreviousGraph = graphMemory.nodeIds.size > 0;
        const addedCount = hasPreviousGraph
          ? rawNodes.filter((node) => !graphMemory.nodeIds.has(node.id)).length
          : 0;
        const removedCount = hasPreviousGraph
          ? Array.from(graphMemory.nodeIds).filter((id) => !currentNodeIds.has(id)).length
          : 0;

        const width = 1120;
        const height = 620;
        const center = { x: width / 2, y: height / 2 };
        const nodes = rawNodes.map((node, index) => ({
          ...node,
          index,
          degree: Number(node.degree || 0),
          radius: Math.max(5, Math.min(34, 7 + Number(node.degree || 0) * 2.2 + (node.is_focus ? 12 : 0))),
          delta: hasPreviousGraph && !graphMemory.nodeIds.has(node.id) ? "added" : "",
        }));
        const nodeById = new Map(nodes.map((node) => [node.id, node]));
        const edges = rawEdges
          .map((edge) => ({ ...edge, sourceNode: nodeById.get(edge.source), targetNode: nodeById.get(edge.target) }))
          .filter((edge) => edge.sourceNode && edge.targetNode);

        nodes.forEach((node, index) => {
          const previousPoint = graphMemory.positions.get(node.id);
          if (previousPoint) {
            node.x = previousPoint.x;
            node.y = previousPoint.y;
            return;
          }
          if (node.is_focus) {
            node.x = center.x;
            node.y = center.y;
            return;
          }
          const angle = (index * 2.399963229728653) % (Math.PI * 2);
          const ring = 120 + (index % 5) * 42 + Math.min(80, node.degree * 8);
          node.x = center.x + Math.cos(angle) * ring;
          node.y = center.y + Math.sin(angle) * ring * 0.68;
        });

        for (let step = 0; step < 180; step += 1) {
          nodes.forEach((node) => { node.vx = (node.vx || 0) * 0.82; node.vy = (node.vy || 0) * 0.82; });
          for (let i = 0; i < nodes.length; i += 1) {
            for (let j = i + 1; j < nodes.length; j += 1) {
              const a = nodes[i];
              const b = nodes[j];
              const dx = a.x - b.x || 0.01;
              const dy = a.y - b.y || 0.01;
              const dist2 = Math.max(80, dx * dx + dy * dy);
              const force = 950 / dist2;
              const fx = dx * force;
              const fy = dy * force;
              if (!a.is_focus) { a.vx += fx; a.vy += fy; }
              if (!b.is_focus) { b.vx -= fx; b.vy -= fy; }
            }
          }
          edges.forEach((edge) => {
            const a = edge.sourceNode;
            const b = edge.targetNode;
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const dist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
            const target = 105 + Math.min(45, (a.radius + b.radius) * 1.4);
            const force = (dist - target) * 0.012;
            const fx = (dx / dist) * force;
            const fy = (dy / dist) * force;
            if (!a.is_focus) { a.vx += fx; a.vy += fy; }
            if (!b.is_focus) { b.vx -= fx; b.vy -= fy; }
          });
          nodes.forEach((node) => {
            if (node.is_focus) return;
            node.vx += (center.x - node.x) * 0.002;
            node.vy += (center.y - node.y) * 0.002;
            node.x = Math.max(42, Math.min(width - 42, node.x + node.vx));
            node.y = Math.max(52, Math.min(height - 42, node.y + node.vy));
          });
        }

        function nodeClass(node) {
          if (node.is_focus || node.type === "root") return "focus";
          return String(node.type || "concept").replace(/[^a-z0-9_-]/gi, "");
        }

        function edgePath(edge, index) {
          const a = edge.sourceNode;
          const b = edge.targetNode;
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const mx = (a.x + b.x) / 2;
          const my = (a.y + b.y) / 2;
          const len = Math.max(1, Math.sqrt(dx * dx + dy * dy));
          const bend = ((index % 5) - 2) * 9;
          const cx = mx - (dy / len) * bend;
          const cy = my + (dx / len) * bend;
          return `
            <path class="kg-network-edge" d="M ${a.x.toFixed(1)} ${a.y.toFixed(1)} Q ${cx.toFixed(1)} ${cy.toFixed(1)} ${b.x.toFixed(1)} ${b.y.toFixed(1)}">
              <title>${escapeHtml(edge.source_label || edge.source)} ${escapeHtml(edge.label || "关联")} ${escapeHtml(edge.target_label || edge.target)}</title>
            </path>
          `;
        }

        function nodeSvg(node) {
          const showLabel = node.is_focus || node.degree >= 3 || node.radius >= 15;
          const title = [
            node.full_label || node.label || node.id,
            node.native_type ? `类型：${node.native_type}` : "",
            node.file_path ? `来源：${node.file_path}` : "",
            node.summary || "",
          ].filter(Boolean).join("\n");
          return `
            <g class="kg-network-node ${escapeHtml(nodeClass(node))} ${node.delta}" data-node-id="${escapeHtml(node.id)}" transform="translate(${node.x.toFixed(1)}, ${node.y.toFixed(1)})" tabindex="0" role="button">
              <circle r="${node.radius.toFixed(1)}"></circle>
              <title>${escapeHtml(title)}</title>
              ${showLabel ? `<text x="${node.radius + 7}" y="4">${escapeHtml(shortText(node.full_label || node.label || node.id, node.is_focus ? 28 : 22))}</text>` : ""}
            </g>
          `;
        }

        knowledgeGraphEl.innerHTML = `
          <div class="kg-head">
            <div>
              <h3>知识图谱</h3>
              <p>${escapeHtml(graph.summary || "已基于当前知识库生成素材关系图。")}</p>
            </div>
            <span>LightRAG Graph</span>
          </div>
          <svg class="kg-network" viewBox="0 0 ${width} ${height}" role="img" aria-label="LightRAG 原生知识图谱网络">
            ${edges.map(edgePath).join("")}
            ${nodes.map(nodeSvg).join("")}
          </svg>
          <div class="kg-legend">
            <span><i class="focus"></i>中心实体</span>
            <span><i class="concept"></i>概念</span>
            <span><i class="method"></i>方法/系统</span>
            <span><i class="metric"></i>指标</span>
            <span><i class="scenario"></i>场景</span>
            ${hasPreviousGraph ? `<span class="kg-diff">本次变化：新增 ${addedCount}，减少 ${removedCount}</span>` : ""}
          </div>
          <div id="kgNodeDetail" class="kg-node-detail hidden"></div>
          ${(graph.notes || []).length ? `<div class="kg-notes">${graph.notes.map((note) => `<span>${escapeHtml(note)}</span>`).join("")}</div>` : ""}
        `;

        const nextPositions = new Map();
        nodes.forEach((node) => nextPositions.set(node.id, { x: node.x, y: node.y }));
        graphMemory.positions = nextPositions;
        graphMemory.nodeIds = currentNodeIds;

        const detailEl = document.getElementById("kgNodeDetail");
        function openNodeDetail(node) {
          const relatedEdges = edges.filter((edge) => edge.source === node.id || edge.target === node.id).slice(0, 8);
          detailEl.className = "kg-node-detail";
          detailEl.innerHTML = `
            <div class="kg-detail-head">
              <div>
                <span>${escapeHtml(node.native_type || node.type || "entity")}</span>
                <h4>${escapeHtml(node.full_label || node.label || node.id)}</h4>
              </div>
              <button class="button ghost" type="button" id="kgDetailClose">关闭</button>
            </div>
            <p>${escapeHtml(node.summary || "LightRAG 暂未返回该节点的详细描述。")}</p>
            ${node.file_path ? `<div class="kg-detail-meta"><strong>来源文档</strong><span>${escapeHtml(node.file_path)}</span></div>` : ""}
            ${node.source_id ? `<div class="kg-detail-meta"><strong>来源片段</strong><span>${escapeHtml(node.source_id)}</span></div>` : ""}
            ${relatedEdges.length ? `
              <div class="kg-detail-relations">
                <strong>相关关系</strong>
                ${relatedEdges.map((edge) => `
                  <span>${escapeHtml(edge.source_label || edge.source)} ${escapeHtml(edge.label || "关联")} ${escapeHtml(edge.target_label || edge.target)}</span>
                `).join("")}
              </div>
            ` : ""}
          `;
          document.getElementById("kgDetailClose").addEventListener("click", () => {
            detailEl.className = "kg-node-detail hidden";
          });
        }
        knowledgeGraphEl.querySelectorAll(".kg-network-node").forEach((element) => {
          const node = nodeById.get(element.dataset.nodeId);
          if (!node) return;
          element.addEventListener("click", () => openNodeDetail(node));
          element.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              openNodeDetail(node);
            }
          });
        });
      }

      async function uploadMaterial(event) {
        event.preventDefault();
        const input = document.getElementById("materialFile");
        const btn = document.getElementById("uploadBtn");
        if (!input.files.length) {
          showMessage("请选择一个文件。", "danger");
          return;
        }

        const form = new FormData();
        form.append("file", input.files[0]);
        const mode = document.querySelector('input[name="knowledgeBaseMode"]:checked')?.value || "";
        form.append("knowledge_base_mode", mode);
        if (mode === "existing") {
          const targetId = document.getElementById("uploadKnowledgeBaseId").value;
          if (!targetId) {
            showMessage("请选择素材要存入的知识库。", "danger");
            return;
          }
          form.append("knowledge_base_id", targetId);
        } else {
          const name = document.getElementById("newKnowledgeBaseName").value.trim();
          if (!name) {
            showMessage("请输入新知识库名称。", "danger");
            return;
          }
          form.append("new_knowledge_base_name", name);
          form.append("new_knowledge_base_description", document.getElementById("newKnowledgeBaseDescription").value.trim());
          const baseUrl = document.getElementById("newKnowledgeBaseBaseUrl").value.trim();
          if (!kbManager.available && !baseUrl) {
            showMessage("请输入该知识库独立的 LightRAG API 地址。", "danger");
            return;
          }
          if (baseUrl) form.append("new_knowledge_base_base_url", baseUrl);
        }
        btn.disabled = true;
        btn.textContent = mode === "new" && kbManager.available ? "正在创建知识库" : "上传中";
        showMessage(mode === "new" && kbManager.available ? "正在创建独立知识库实例，完成后将自动上传素材。" : "正在上传素材并触发 LightRAG 扫描。", "info");
        try {
          const res = await fetch("/api/knowledge/upload", { method: "POST", body: form });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "上传失败");
          input.value = "";
          document.getElementById("newKnowledgeBaseName").value = "";
          document.getElementById("newKnowledgeBaseDescription").value = "";
          document.getElementById("newKnowledgeBaseBaseUrl").value = "";
          const targetName = data.knowledge_base?.name || "所选知识库";
          showMessage(data.scan_error ? `已存入“${targetName}”，但扫描触发失败：${data.scan_error}` : `上传成功，素材已分配到“${targetName}”。`, data.scan_error ? "danger" : "success");
          await loadKnowledge();
        } catch (err) {
          showMessage(`上传失败：${err}`, "danger");
        } finally {
          btn.disabled = false;
          btn.textContent = "上传并扫描";
        }
      }

      async function clearKnowledge() {
        const confirmed = window.confirm("确认清空 LightRAG 知识库文档？该操作会删除当前知识库素材。");
        if (!confirmed) return;
        const btn = document.getElementById("clearBtn");
        btn.disabled = true;
        showMessage("正在清空知识库。", "info");
        try {
          const res = await fetch("/api/knowledge", {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ knowledge_base_id: selectedKnowledgeBaseId || "all" })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "清空失败");
          showMessage("知识库已清空。", "success");
          await loadKnowledge();
        } catch (err) {
          showMessage(`清空失败：${err}`, "danger");
        } finally {
          btn.disabled = false;
        }
      }

      async function deleteSelectedDocuments() {
        const docIds = selectedDocIds();
        if (!docIds.length) {
          showMessage("请选择要删除的素材。", "danger");
          return;
        }
        const confirmed = window.confirm(`确认删除选中的 ${docIds.length} 个素材？`);
        if (!confirmed) return;
        deleteSelectedBtn.disabled = true;
        showMessage("正在删除选中素材。", "info");
        try {
          const res = await fetch("/api/knowledge/documents", {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ doc_ids: docIds, delete_file: true, knowledge_base_id: selectedKnowledgeBaseId || "all" })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "删除失败");
          showMessage(`已删除 ${docIds.length} 个素材。`, "success");
          await loadKnowledge();
        } catch (err) {
          showMessage(`删除失败：${err}`, "danger");
        } finally {
          updateDeleteButton();
        }
      }

      async function startRun() {
        const btn = document.getElementById("startBtn");
        btn.disabled = true;
        btn.textContent = "启动中";
        try {
          const res = await fetch("/api/runs", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              innovation_level: document.querySelector('input[name="innovationLevel"]:checked')?.value || "medium",
              knowledge_base_id: selectedKnowledgeBaseId || "all"
            })
          });
          const data = await res.json();
          window.location.href = data.url;
        } finally {
          btn.disabled = false;
          btn.textContent = "生成专利方案";
        }
      }

      document.getElementById("uploadForm").addEventListener("submit", uploadMaterial);
      document.querySelectorAll('input[name="knowledgeBaseMode"]').forEach((input) => {
        input.addEventListener("change", updateUploadDestinationState);
      });
      deleteSelectedBtn.addEventListener("click", deleteSelectedDocuments);
      document.getElementById("clearBtn").addEventListener("click", clearKnowledge);
      document.getElementById("refreshBtn").addEventListener("click", loadKnowledge);
      document.getElementById("startBtn").addEventListener("click", startRun);
      document.querySelectorAll('input[name="innovationLevel"]').forEach((input) => {
        input.addEventListener("change", () => {
          const label = { low: "低", medium: "中", high: "高" }[input.value] || "中";
          innovationValue.textContent = label;
        });
      });
      loadKnowledge();
    </script>
  </body>
</html>
