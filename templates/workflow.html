<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>专利策源台 · 生成流程</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <script>
      window.MathJax = {
        tex: { inlineMath: [["$", "$"], ["\\(", "\\)"]], displayMath: [["$$", "$$"], ["\\[", "\\]"]] },
        options: { skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"] }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  </head>
  <body>
    <main class="shell wide">
      <header class="topbar">
        <div>
          <p class="eyebrow">Interactive Workflow</p>
          <h1>专利方案生成</h1>
        </div>
        <div class="top-actions">
          <a class="button ghost" href="/">返回首页</a>
          <span class="status-pill" id="runStatus">自动推进中</span>
        </div>
      </header>

      <div class="workflow-grid">
        <aside class="panel timeline-panel">
          <div class="panel-head compact">
            <div>
              <h2>执行进度</h2>
              <p id="phaseText">准备中</p>
            </div>
          </div>
          <div id="timeline" class="timeline"></div>
        </aside>

        <section class="panel work-panel">
          <div id="mainPanel"></div>
        </section>
      </div>
    </main>

    <script>
      const runId = "{{ run_id }}";
      const runStatus = document.getElementById("runStatus");
      const mainPanel = document.getElementById("mainPanel");
      const timeline = document.getElementById("timeline");
      const phaseText = document.getElementById("phaseText");
      let state = null;
      let busy = false;
      let autoRunning = false;
      let pendingSectionTransition = null;
      let sectionBusyAction = null;
      let latestHistoryRecord = null;

      if (window.mermaid) {
        mermaid.initialize({ startOnLoad: false, securityLevel: "loose", theme: "neutral" });
      }

      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, (c) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
        }[c]));
      }

      function artifactLinks(artifacts) {
        return Object.entries({
          docx: "下载 Word 文档",
          result: "下载最终 Markdown",
          draft: "下载交互草稿 Markdown",
          similarity_xlsx: "下载差异分析 Excel",
          similarity_markdown: "下载差异分析 Markdown",
          token_usage_report: "下载 Token 报告"
        }).filter(([key]) => artifacts?.[key]).map(([key, label]) =>
          `<a href="${artifacts[key]}" target="_blank">${label}</a>`
        ).join("");
      }

      function assessmentBlock(title, item) {
        if (!item) return "";
        const dimensions = item.dimensions || [];
        return `
          <div class="assessment">
            <h3>${title}</h3>
            <div class="score-line">
              <strong>${item.score}/100</strong>
              <span>${item.level}</span>
            </div>
            <div class="subscore">项目材料 ${item.project_score || 0}/75 · 专利避重 ${item.prior_art_score || 0}/25</div>
            ${dimensions.length ? `
              <div class="dimension-grid">
                ${dimensions.map((dim) => `
                  <div class="dimension-card ${dim.passed ? "passed" : "failed"}">
                    <div class="dimension-head">
                      <strong>${escapeHtml(dim.name)}</strong>
                      <span>${dim.score}/${dim.max_score}</span>
                    </div>
                    <p>${escapeHtml(dim.evidence || "")}</p>
                    ${dim.passed ? "" : `<em>${escapeHtml(dim.suggestion || "")}</em>`}
                  </div>
                `).join("")}
              </div>
            ` : `<ul>${(item.reasons || []).map((reason) => `<li>${escapeHtml(reason)}</li>`).join("")}</ul>`}
            ${(item.capped_by || []).length ? `<div class="cap-list">${item.capped_by.map((cap) => `<p>封顶规则：${escapeHtml(cap)}</p>`).join("")}</div>` : ""}
          </div>
        `;
      }

      function qualityBlock(report, title = "写作质量检查") {
        if (!report) return "";
        const issues = report.issues || [];
        return `
          <div class="quality-panel ${report.passed ? "passed" : "failed"}" data-no-mathjax>
            <div class="quality-head">
              <div>
                <span>${escapeHtml(title)}</span>
                <strong>${report.score}/100</strong>
              </div>
              <b>${report.passed ? "已通过" : "需要关注"}</b>
            </div>
            ${issues.length ? `
              <div class="quality-issues">
                ${issues.map((issue) => `
                  <div>
                    <strong>${escapeHtml(plainQualityText(issue.message))}</strong>
                    <p>${escapeHtml(plainQualityText(issue.repair))}</p>
                  </div>
                `).join("")}
              </div>
            ` : `<p>标题、背景问题链、创新点位置、有益效果证据和保护范围检查均通过。</p>`}
          </div>
        `;
      }

      function plainQualityText(text) {
        return String(text || "")
          .replace(/\$\$\.{3}\$\$/g, "独立公式块")
          .replace(/\$\.{3}\$/g, "行内公式")
          .replace(/\$\$/g, "独立公式定界符")
          .replace(/\$/g, "行内公式定界符");
      }

      function inlineFormat(text) {
        return escapeHtml(cleanInlineText(text))
          .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
          .replace(/`([^`]+)`/g, "<code>$1</code>");
      }

      function cleanInlineText(text) {
        return String(text || "")
          .replace(/\\n/g, "\n")
          .replace(/<!--[\s\S]*?-->/g, "")
          .replace(/^[-*_]{3,}$/g, "")
          .replace(/\*\*([^*]+)\*\*/g, "$1")
          .replace(/`([^`]+)`/g, "$1")
          .trim();
      }

      function cleanHeadingText(text) {
        return cleanInlineText(text).replace(/^#+\s*/, "").replace(/^\*+|\*+$/g, "").trim();
      }

      function renderMarkdown(markdown) {
        const lines = String(markdown || "").replace(/\\n/g, "\n").split(/\r?\n/);
        const blocks = [];
        let list = [];
        let code = [];
        let inCode = false;
        let codeLang = "";
        let inFormula = false;
        let formula = [];

        function flushList() {
          if (!list.length) return;
          blocks.push(`<ul>${list.map((item) => `<li>${inlineFormat(item)}</li>`).join("")}</ul>`);
          list = [];
        }

        function flushCode() {
          const content = code.join("\n").trim();
          if (codeLang === "mermaid" && content) {
            blocks.push(`<div class="diagram-card"><div class="mermaid">${escapeHtml(content)}</div></div>`);
          } else if (content) {
            blocks.push(`<pre class="code-block">${escapeHtml(content)}</pre>`);
          }
          code = [];
          codeLang = "";
        }

        for (const rawLine of lines) {
          const line = rawLine.trimEnd();
          if (line.trim() === "$$") {
            flushList();
            if (inFormula) {
              blocks.push(`<div class="formula-block">\\[${escapeHtml(formula.join("\n").trim())}\\]</div>`);
              formula = [];
              inFormula = false;
            } else {
              inFormula = true;
            }
            continue;
          }
          if (inFormula) {
            formula.push(line);
            continue;
          }
          const singleFormula = line.trim().match(/^\$\$(.+)\$\$$/);
          if (singleFormula) {
            flushList();
            blocks.push(`<div class="formula-block">\\[${escapeHtml(singleFormula[1].trim())}\\]</div>`);
            continue;
          }
          const fence = line.match(/^```(\w+)?/);
          if (fence) {
            if (inCode) {
              inCode = false;
              flushCode();
            } else {
              flushList();
              inCode = true;
              codeLang = (fence[1] || "").toLowerCase();
            }
            continue;
          }
          if (inCode) {
            code.push(line);
            continue;
          }
          if (!line.trim()) {
            flushList();
            continue;
          }
          const heading = line.match(/^(#{1,6})\s*(.+)$/);
          if (heading) {
            flushList();
            const level = Math.min(heading[1].length + 1, 5);
            blocks.push(`<h${level}>${inlineFormat(cleanHeadingText(heading[2]))}</h${level}>`);
            continue;
          }
          const bullet = line.match(/^[-*]\s+(.+)$/) || line.match(/^\d+[.、]\s+(.+)$/);
          if (bullet) {
            list.push(bullet[1]);
            continue;
          }
          flushList();
          const cleaned = cleanInlineText(line.replace(/^>+\s*/, ""));
          if (cleaned) {
            blocks.push(`<p>${inlineFormat(cleaned)}</p>`);
          }
        }
        flushList();
        if (inCode) flushCode();
        if (formula.length) {
          blocks.push(`<div class="formula-block">\\[${escapeHtml(formula.join("\n").trim())}\\]</div>`);
        }
        return blocks.join("");
      }

      function parseCandidate(raw) {
        const fields = {};
        String(raw || "").split(/\r?\n/).forEach((line) => {
          const match = line.match(/^\s*([^：:]{2,12})[：:]\s*(.+)$/);
          if (match) fields[match[1].trim()] = match[2].trim();
        });
        return fields;
      }

      function candidateCard(item, index) {
        const fields = parseCandidate(item.raw || item.summary);
        const rows = [
          ["核心方案", fields["核心方案"]],
          ["创新点", fields["创新点"]],
          ["避让现有技术", fields["避让现有技术"]],
          ["未复用已有技术特征", fields["未复用已有技术特征"]],
          ["新技术特征", fields["新技术特征"]],
          ["技术效果来源", fields["技术效果来源"]],
          ["重合风险", fields["重合风险"]],
          ["人工确认点", fields["人工确认点"]],
          ["素材充分性", fields["素材充分性"]],
        ].filter(([, value]) => value);
        return `
          <label class="candidate-card">
            <input type="radio" name="candidate" value="${index}" ${index === 0 ? "checked" : ""}>
            <div>
              <strong>${escapeHtml(item.title)}</strong>
              <div class="candidate-summary">
                ${rows.length ? rows.map(([label, value]) => `
                  <div><span>${label}</span><p>${inlineFormat(value)}</p></div>
                `).join("") : `<p>${inlineFormat(item.summary || item.raw || "")}</p>`}
              </div>
            </div>
          </label>
        `;
      }

      function materialStrategyBlock(strategy) {
        if (!strategy) return "";
        const layers = strategy.layers || [];
        const paths = strategy.candidate_paths || [];
        const overview = strategy.fusion_overview || {};
        const blueprint = strategy.fusion_blueprint || [];
        return `
          <section class="material-map">
            <div class="material-map-head">
              <div>
                <h3>素材分层与组合依据</h3>
                <p>${escapeHtml(strategy.summary || "系统已按材料用途完成分层。")}</p>
                ${overview.summary ? `<p>${escapeHtml(overview.summary)}</p>` : ""}
                ${strategy.external_usage_boundary ? `<p><strong>${escapeHtml(strategy.external_usage_boundary)}</strong></p>` : ""}
              </div>
            </div>
            ${overview.anti_random_mix_rule ? `
              <div class="fusion-overview">
                <strong>防止乱融合规则</strong>
                <p>${escapeHtml(overview.anti_random_mix_rule)}</p>
                ${overview.graph_basis ? `<p>图谱依据：${escapeHtml(overview.graph_basis)}</p>` : ""}
              </div>
            ` : ""}
            ${blueprint.length ? `
              <div class="fusion-blueprint">
                <h3>Agent 融合思路</h3>
                <div class="fusion-step-grid">
                  ${blueprint.map((step) => `
                    <article class="fusion-step-card">
                      <strong>${escapeHtml(step.stage)}</strong>
                      <p>${escapeHtml(step.logic || "")}</p>
                      <div class="path-tags">${(step.uses || []).map((item) => `<span>${escapeHtml(item)}</span>`).join("")}</div>
                      <small>${escapeHtml(step.output || "")}</small>
                    </article>
                  `).join("")}
                </div>
              </div>
            ` : ""}
            <div class="material-layer-grid">
              ${layers.map((layer) => `
                <article class="material-layer-card">
                  <div class="registry-head">
                    <strong>${escapeHtml(layer.name)}</strong>
                    <span>${layer.knowledge_count || 0} 知识库 / ${layer.external_count || 0} 外部</span>
                  </div>
                  <p>${escapeHtml(layer.role || "")}</p>
                  <div class="material-source-list">
                    ${(layer.knowledge_items || []).slice(0, 3).map((item) => `<span>知识库：${escapeHtml(item.title)}</span>`).join("")}
                    ${(layer.external_items || []).slice(0, 2).map((item) => `<span>外部：${escapeHtml(item.title)}</span>`).join("")}
                  </div>
                </article>
              `).join("")}
            </div>
            ${(strategy.combination_rules || []).length ? `
              <div class="combination-rules">
                ${(strategy.combination_rules || []).map((rule) => `<p>${escapeHtml(rule)}</p>`).join("")}
              </div>
            ` : ""}
            ${paths.length ? `
              <div class="candidate-path-list">
                <h3>候选 idea 的素材组合路径</h3>
                ${paths.map((path) => `
                  <article class="candidate-path-card">
                    <strong>${path.candidate_index}. ${escapeHtml(path.title)}</strong>
                    <p>${escapeHtml(path.idea_rationale || "")}</p>
                    <div class="path-tags">
                      ${(path.source_layers || []).map((layer) => `<span>${escapeHtml(layer.name)}</span>`).join("")}
                    </div>
                    ${candidateFusionDetails(path)}
                  </article>
                `).join("")}
              </div>
            ` : ""}
          </section>
        `;
      }

      function candidateFusionDetails(path) {
        const steps = path.fusion_steps || [];
        const matrix = path.contribution_matrix || [];
        const risks = path.risk_controls || [];
        if (!steps.length && !matrix.length && !risks.length) return "";
        return `
          <details class="candidate-fusion-details">
            <summary>展开融合证据链</summary>
            ${steps.length ? `
              <div class="fusion-detail-grid">
                ${steps.map((step) => `
                  <div class="fusion-detail-card">
                    <strong>${escapeHtml(step.name)}</strong>
                    <p>${escapeHtml(step.explanation || "")}</p>
                    <div class="material-source-list">${(step.evidence || []).map((item) => `<span>${escapeHtml(item)}</span>`).join("") || "<span>图谱综合证据</span>"}</div>
                  </div>
                `).join("")}
              </div>
            ` : ""}
            ${matrix.length ? `
              <div class="fusion-matrix">
                ${matrix.map((row) => `
                  <div>
                    <strong>${escapeHtml(row.layer)} · ${escapeHtml(row.role)}</strong>
                    <p>${escapeHtml(row.meaning || "")}</p>
                    <div class="material-source-list">${(row.sources || []).map((source) => `<span>${escapeHtml(source)}</span>`).join("")}</div>
                  </div>
                `).join("")}
              </div>
            ` : ""}
            ${path.non_reuse_boundary ? `<p class="fusion-boundary">不可复用边界：${escapeHtml(path.non_reuse_boundary)}</p>` : ""}
            ${risks.length ? `<ul class="fusion-risk-list">${risks.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>` : ""}
          </details>
        `;
      }

      function renderTimeline() {
        timeline.innerHTML = (state.events || []).map((event) => `
          <div class="timeline-item">
            <div class="dot"></div>
            <div>
              <strong>${escapeHtml(event.title)}</strong>
              <p>${escapeHtml(event.detail)}</p>
            </div>
          </div>
        `).join("") || '<div class="empty">尚未开始执行</div>';
      }

      function renderCandidatePanel() {
        return `
          <div class="section-head">
            <h2>选择专利方向</h2>
            <p>已生成候选方向和相似专利差异分析。请选择一个方向继续写作，也可以手动输入新方向。</p>
          </div>
          <div class="artifact-row">
            ${state.artifacts.similarity_markdown ? `<a href="${state.artifacts.similarity_markdown}" target="_blank">查看差异分析 Markdown</a>` : ""}
            ${state.artifacts.similarity_xlsx ? `<a href="${state.artifacts.similarity_xlsx}" target="_blank">打开 Excel</a>` : ""}
          </div>
          ${materialStrategyBlock(state.material_strategy)}
          <div class="candidate-list">
            ${state.candidates.map(candidateCard).join("")}
          </div>
          <label class="field">
            <span>或手动输入专利名称</span>
            <input id="customTitle" placeholder="留空则使用上方选择">
          </label>
          <button class="button primary" onclick="selectCandidate()">确认方向并开始写作</button>
        `;
      }

      function renderSectionPanel() {
        const section = state.section || {};
        const isLoadingNext = pendingSectionTransition && !state.waiting_for && !state.done;
        const isSectionBusy = Boolean(sectionBusyAction);
        const displaySection = isLoadingNext ? pendingSectionTransition.section : section;
        const index = isLoadingNext ? pendingSectionTransition.index : (section.index || 0);
        const busyText = sectionBusyAction === "rewrite"
          ? "正在重写本章"
          : sectionBusyAction === "revise"
            ? "正在根据修改意见重写"
            : sectionBusyAction === "manual"
              ? "正在保存手动编辑"
              : sectionBusyAction === "accept"
                ? "正在确认本章"
                : sectionBusyAction === "quit"
                  ? "正在结束并保存"
                  : "正在处理当前章节";
        return `
          <div class="section-head">
            <div>
              <h2>${escapeHtml(displaySection.name || "章节")}</h2>
              <p>第 ${index + 1} / ${section.total || displaySection.total || 0} 步。${isLoadingNext ? "本章已确认，正在生成下一章。" : isSectionBusy ? "Agent 正在处理当前操作，请等待结果返回。" : "确认后进入下一章。"}</p>
            </div>
          </div>
          ${isLoadingNext ? `<div class="section-loading"><div class="spinner"></div><div><strong>正在生成下一章</strong><p>请稍等，完成后页面会自动切换到下一部分。</p></div></div>` : ""}
          ${isSectionBusy ? `<div class="section-loading"><div class="spinner"></div><div><strong>${busyText}</strong><p>请不要重复点击，完成后本章内容会自动刷新。</p></div></div>` : ""}
          ${isLoadingNext || isSectionBusy ? "" : qualityBlock(section.quality, "本章质量检查")}
          <div class="markdown-box markdown-body ${isLoadingNext ? "is-confirmed" : ""} ${isSectionBusy ? "is-processing" : ""}">${renderMarkdown(displaySection.content || "")}</div>
          <div class="action-row ${isLoadingNext ? "hidden" : ""}">
            <button class="button primary" onclick="sectionAction('accept')" ${isSectionBusy ? "disabled" : ""}>接受并继续</button>
            <button class="button ghost" onclick="sectionAction('rewrite')" ${isSectionBusy ? "disabled" : ""}>重写本章</button>
            <button class="button ghost" onclick="toggleBox('reviseBox')" ${isSectionBusy ? "disabled" : ""}>提修改意见</button>
            <button class="button ghost" onclick="toggleBox('manualBox')" ${isSectionBusy ? "disabled" : ""}>手动编辑</button>
            <button class="button danger" onclick="sectionAction('quit')" ${isSectionBusy ? "disabled" : ""}>结束并保存</button>
          </div>
          <div class="edit-box ${sectionBusyAction === "revise" ? "" : "hidden"}" id="reviseBox">
            <label class="field">
              <span>修改意见</span>
              <textarea id="instruction" rows="4" placeholder="例如：加强技术效果，减少泛泛表述"></textarea>
            </label>
            <button class="button primary" onclick="sectionAction('revise')" ${isSectionBusy ? "disabled" : ""}>按意见修改</button>
          </div>
          <div class="edit-box ${sectionBusyAction === "manual" ? "" : "hidden"}" id="manualBox">
            <label class="field">
              <span>手动替换本章内容</span>
              <textarea id="manualContent" rows="12">${escapeHtml(section.content || "")}</textarea>
            </label>
            <button class="button primary" onclick="sectionAction('manual')" ${isSectionBusy ? "disabled" : ""}>替换并接受</button>
          </div>
        `;
      }

      function renderWritingLoadingPanel() {
        const lastSection = pendingSectionTransition?.section || state.last_confirmed_section;
        const nextName = state.next_section_name || "下一部分";
        if (!lastSection) {
          return `
            <div class="section-head">
              <div>
                <h2>开始分章节写作</h2>
                <p>已确认专利方向，正在生成第一部分：${escapeHtml(nextName)}。</p>
              </div>
            </div>
            <div class="section-loading"><div class="spinner"></div><div><strong>正在生成 ${escapeHtml(nextName)}</strong><p>页面会在生成完成后直接切换到该部分。</p></div></div>
            <div class="writing-context">
              <span>已选择方向</span>
              <strong>${escapeHtml(state.selected_candidate?.title || "")}</strong>
            </div>
          `;
        }
        return `
          <div class="section-head">
            <div>
              <h2>${escapeHtml(lastSection.name || "已确认章节")}</h2>
              <p>第 ${(lastSection.index || 0) + 1} / ${lastSection.total || state.section?.total || 0} 步已确认，正在生成：${escapeHtml(nextName)}。</p>
            </div>
          </div>
          <div class="section-loading"><div class="spinner"></div><div><strong>正在生成 ${escapeHtml(nextName)}</strong><p>请稍等，完成后页面会直接切换到下一部分。</p></div></div>
          <div class="markdown-box markdown-body is-confirmed">${renderMarkdown(lastSection.content || "")}</div>
        `;
      }

      function renderOverview() {
        const docs = state.knowledge?.documents || [];
        const isFreshRun = state.phase === "created" && !(state.events || []).length && !busy;
        const latestDownloads = latestHistoryRecord?.artifacts ? artifactLinks(latestHistoryRecord.artifacts) : "";
        return `
          <div class="section-head">
            <h2>当前状态</h2>
            <p>系统正在按知识库读取、素材评估、外部检索、候选生成、差异分析和分章节写作自动推进。需要你判断时会停下来。</p>
          </div>
          ${isFreshRun ? `
            <div class="download-panel">
              <h3>当前流程尚未开始</h3>
              <p>如果你想查看刚刚完成的结果，请进入历史记录。完整生成过程和文件下载都会保存在历史记录中。</p>
              <div class="artifact-row">
                <a href="/history" target="_blank">打开历史记录</a>
                ${latestHistoryRecord?.detail_url ? `<a href="${latestHistoryRecord.detail_url}" target="_blank">查看最近一次完整过程</a>` : ""}
                ${latestDownloads}
              </div>
            </div>
          ` : ""}
          ${busy ? `<div class="running-card"><div class="spinner"></div><div><strong>正在执行下一步</strong><p>页面会自动切换到需要确认的节点。</p></div></div>` : ""}
          <div class="summary-grid small">
            <div class="metric"><span>Agent 核</span><strong>${escapeHtml(state.agent_core)}</strong></div>
            <div class="metric"><span>知识库文档</span><strong>${docs.length}</strong></div>
            <div class="metric"><span>外部结果</span><strong>${state.external?.results?.length || 0}</strong></div>
          </div>
          ${state.search_round ? `<div class="note"><strong>自动检索轮次：</strong>第 ${state.search_round} 轮，未达标时会继续自动补充检索。</div>` : ""}
          ${materialStrategyBlock(state.material_strategy)}
          ${assessmentBlock("素材初评", state.initial_assessment)}
          ${assessmentBlock("检索后复评", state.assessment)}
          ${state.search_topic ? `<div class="note"><strong>检索主题：</strong>${escapeHtml(state.search_topic)}</div>` : ""}
          ${state.error ? `<div class="empty danger">${escapeHtml(state.error)}</div>` : ""}
        `;
      }

      function renderDone() {
        const detailUrl = state.history_record?.detail_url || (state.history_record?.id ? `/history/${state.history_record.id}` : "");
        return `
          <div class="section-head">
            <h2>最终文档已生成</h2>
            <p>最终 Markdown、Word 文档和完整生成过程已经保存，可直接下载或查看历史记录。</p>
          </div>
          <div class="download-panel">
            <h3>最终文件下载</h3>
            <div class="artifact-row">
              ${artifactLinks(state.artifacts)}
              ${detailUrl ? `<a href="${detailUrl}" target="_blank">查看完整生成过程</a>` : ""}
            </div>
          </div>
          ${qualityBlock(state.final_quality, "最终文档质量检查")}
        `;
      }

      function render() {
        phaseText.textContent = state.phase;
        runStatus.textContent = sectionBusyAction ? "章节处理中" : state.waiting_for ? "等待确认" : state.done ? "已完成" : "自动推进中";
        renderTimeline();
        mainPanel.classList.add("is-switching");
        window.setTimeout(() => mainPanel.classList.remove("is-switching"), 180);
        if (state.waiting_for === "candidate") {
          pendingSectionTransition = null;
          mainPanel.innerHTML = renderCandidatePanel();
        } else if (state.waiting_for === "section") {
          pendingSectionTransition = null;
          mainPanel.innerHTML = renderSectionPanel();
        } else if (state.done) {
          pendingSectionTransition = null;
          mainPanel.innerHTML = renderDone();
        } else if (state.selected_candidate) {
          mainPanel.innerHTML = renderWritingLoadingPanel();
        } else {
          mainPanel.innerHTML = renderOverview();
        }
        renderDiagrams();
      }

      async function loadState() {
        try {
          const res = await fetch(`/api/runs/${runId}`);
          state = await readJson(res);
          if (!latestHistoryRecord) {
            await loadLatestHistoryRecord();
          }
          render();
        } catch (error) {
          await loadLatestHistoryRecord();
          state = {
            phase: "created",
            waiting_for: null,
            done: false,
            events: [],
            knowledge: { documents: [] },
            external: { results: [] },
            artifacts: {},
            error: error.message || "运行状态读取失败。"
          };
          render();
        }
      }

      async function readJson(response) {
        let data = null;
        try {
          data = await response.json();
        } catch (error) {
          data = { error: await response.text().catch(() => "") };
        }
        if (!response.ok) {
          throw new Error(data?.error || `请求失败：${response.status}`);
        }
        return data;
      }

      function keepStateError(error) {
        state = {
          ...(state || {}),
          error: error.message || String(error || "请求失败")
        };
      }

      async function loadLatestHistoryRecord() {
        try {
          const res = await fetch("/api/history");
          const data = await res.json();
          latestHistoryRecord = (data.records || [])[0] || null;
        } catch (error) {
          latestHistoryRecord = null;
        }
      }

      async function advance() {
        if (busy) return;
        busy = true;
        runStatus.textContent = "执行中";
        render();
        try {
          const res = await fetch(`/api/runs/${runId}/advance`, { method: "POST" });
          state = await readJson(res);
        } catch (error) {
          keepStateError(error);
        } finally {
          busy = false;
          render();
        }
      }

      async function runUntilHumanInput() {
        if (autoRunning) return;
        autoRunning = true;
        while (state && (!state.waiting_for || state.waiting_for === "material") && !state.done && !state.error) {
          await advance();
          await new Promise((resolve) => setTimeout(resolve, 320));
        }
        autoRunning = false;
      }

      async function selectCandidate() {
        const selected = document.querySelector('input[name="candidate"]:checked');
        const customTitle = document.getElementById("customTitle").value;
        try {
          const res = await fetch(`/api/runs/${runId}/select`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ index: selected ? selected.value : null, custom_title: customTitle })
          });
          state = await readJson(res);
        } catch (error) {
          keepStateError(error);
          render();
          return;
        }
        render();
        runUntilHumanInput();
      }

      async function sectionAction(action) {
        if (sectionBusyAction) return;
        const instruction = document.getElementById("instruction")?.value || "";
        const content = document.getElementById("manualContent")?.value || "";
        sectionBusyAction = action;
        if (["accept", "manual"].includes(action)) {
          pendingSectionTransition = {
            section: { ...(state.section || {}), content: action === "manual" && content ? content : state.section?.content },
            index: state.section?.index || 0,
          };
        }
        render();
        let succeeded = false;
        try {
          const res = await fetch(`/api/runs/${runId}/section`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action, instruction, content })
          });
          state = await readJson(res);
          succeeded = true;
        } catch (error) {
          keepStateError(error);
        } finally {
          sectionBusyAction = null;
          render();
        }
        if (succeeded && !["rewrite", "revise"].includes(action)) {
          runUntilHumanInput();
        }
      }

      function toggleBox(id) {
        if (sectionBusyAction) return;
        document.getElementById(id)?.classList.toggle("hidden");
      }

      async function renderDiagrams() {
        if (window.mermaid) {
          try {
            await mermaid.run({ querySelector: ".mermaid" });
          } catch (err) {
            console.warn("Mermaid render failed", err);
          }
        }
        if (window.MathJax?.typesetPromise) {
          try {
            await MathJax.typesetPromise(
              Array.from(mainPanel.querySelectorAll(":scope > *:not([data-no-mathjax])"))
            );
          } catch (err) {
            console.warn("MathJax render failed", err);
          }
        }
      }

      loadState().then(runUntilHumanInput);
    </script>
  </body>
</html>
